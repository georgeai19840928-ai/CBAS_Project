[build]
install = """
apt-get update && \
apt-get install -y --no-install-recommends chromium chromium-driver && \
pip install -r requirements.txt
"""

[deployment]
environment = {
    "CHROME_BIN": "/usr/bin/chromium",
    "CHROMEDRIVER_PATH": "/usr/bin/chromedriver"
}

[deployment.port]
port = 8501
